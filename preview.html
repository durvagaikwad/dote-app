<!DOCTYPE html>
<html>
<head>
<title>Dote — iPhone Preview</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #1a1a2e;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: -apple-system, sans-serif;
}
.phone {
  width: 320px;
  height: 693px;
  border-radius: 50px;
  background: #111;
  padding: 14px;
  box-shadow:
    0 0 0 2px #333,
    0 0 0 4px #111,
    0 40px 80px rgba(0,0,0,.6);
  position: relative;
}
.notch {
  position: absolute;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 28px;
  background: #111;
  border-radius: 0 0 18px 18px;
  z-index: 10;
}
.notch::after {
  content: '';
  position: absolute;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #1a1a2e;
}
.screen {
  width: 100%;
  height: 100%;
  border-radius: 38px;
  overflow: hidden;
  background: #f3e8d8;
}
iframe {
  width: 100%;
  height: 100%;
  border: none;
}
.label {
  color: rgba(255,255,255,.4);
  text-align: center;
  margin-top: 20px;
  font-size: 13px;
  letter-spacing: 1px;
}
</style>
</head>
<body>
<div>
  <div class="phone">
    <div class="notch"></div>
    <div class="screen">
      <iframe src="/index.html"></iframe>
    </div>
  </div>
  <div class="label">iPhone 14 — 390 × 844</div>
</div>
</body>
</html>
